name: Build

on:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Rust toolchain
        run: rustc --version

      - name: Build release binary
        run: cargo build --release --locked
